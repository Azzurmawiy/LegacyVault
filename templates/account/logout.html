<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Out • LegacyVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --bg: #FBF6EE;
      --brown: #5A3E2B;
      --brown-2: #7A5236;
      --accent: #C49A6C;
      --border: #E8DCCB;
      --muted: #6B5B4B;
    }

    body {
      background: var(--bg);
      color: var(--brown);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 380px; height: 380px;
      background: #C49A6C;
      top: -100px; left: -100px;
    }
    body::after {
      width: 320px; height: 320px;
      background: #5A3E2B;
      bottom: -80px; right: -80px;
    }

    .logout-card {
      position: relative;
      z-index: 1;
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(90, 62, 43, 0.14);
      padding: 44px 36px;
      text-align: center;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand-logo { font-size: 40px; line-height: 1; margin-bottom: 8px; }
    .brand-name  { font-size: 22px; font-weight: 900; color: var(--brown); letter-spacing: -0.5px; }

    .divider { border-top: 1px solid var(--border); margin: 24px 0; }

    .farewell-icon {
      width: 64px; height: 64px;
      background: #F3E7D6;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 28px;
      margin: 0 auto 16px;
    }

    .farewell-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .farewell-sub {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .btn-signout {
      background: linear-gradient(135deg, var(--brown-2), var(--brown));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 13px 28px;
      font-size: 16px;
      font-weight: 700;
      width: 100%;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-signout:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(90, 62, 43, 0.22);
      color: #fff;
    }

    .btn-cancel {
      display: block;
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
    }
    .btn-cancel:hover { color: var(--brown); text-decoration: underline; }
  </style>
</head>

<body>
  <div class="logout-card">

    <div class="brand-logo">🕊️</div>
    <div class="brand-name">LegacyVault</div>

    <div class="divider"></div>

    <div class="farewell-icon">👋</div>
    <div class="farewell-title">Sign Out?</div>
    <div class="farewell-sub">Your legacy is safely stored. Come back anytime.</div>

    <form method="POST" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button class="btn-signout" type="submit">Yes, Sign Me Out</button>
    </form>

    <a class="btn-cancel" href="/">No, take me back</a>

  </div>
</body>
</html>
