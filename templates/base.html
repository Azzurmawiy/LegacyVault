<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LegacyVault</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    @keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.fade-up { animation: fadeUp .35s ease both; }

.hover-lift {
  transition: transform .15s ease, box-shadow .15s ease;
}

.hover-lift:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 24px rgba(90, 62, 43, 0.14);
}

.icon-badge{
  width: 46px; height: 46px;
  display: grid; place-items: center;
  border-radius: 14px;
  background: #F3E7D6;
  border: 1px solid var(--border);
  color: var(--brown);
}

    :root{
      --bg: #FBF6EE;          /* cream */
      --card: #FFFFFF;
      --brown: #5A3E2B;       /* cocoa */
      --brown-2: #7A5236;     /* lighter cocoa */
      --accent: #C49A6C;      /* warm sand */
      --muted: #6B5B4B;
      --border: #E8DCCB;
    }

    body{
      font-size: 18px; line-height: 1.6;
      background: var(--bg);
      color: var(--brown);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .nav-wrap{
      background: var(--brown);
      border-bottom: 3px solid var(--accent);
    }

    .brand{
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .nav-link{
      color: #fff !important;
      opacity: 0.92;
      font-weight: 600;
    }
    .nav-link:hover{ opacity: 1; text-decoration: underline; }

    .page-title{
      font-size: 38px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .page-subtitle{
      color: var(--muted);
      font-size: 18px;
    }

    .card{
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 8px 18px rgba(90, 62, 43, 0.08);
    }

    .big-action{
      padding: 18px 16px;
      font-size: 18px;
      border-radius: 14px;
      font-weight: 700;
    }

    .btn-warm{
      background: var(--accent);
      border: none;
      color: #2B1B10;
    }
    .btn-warm:hover{ filter: brightness(0.95); }

    .btn-cocoa{
      background: var(--brown-2);
      border: none;
      color: #fff;
    }
    .btn-cocoa:hover{ filter: brightness(0.95); }

    .pill{
      display:inline-block;
      background: #F3E7D6;
      border: 1px solid var(--border);
      color: var(--brown);
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
    }

    .soft-input{
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 12px;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg nav-wrap px-3 py-3">
    <div class="container-fluid">
      <a class="navbar-brand text-white brand" href="/">🕊️ LegacyVault</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample">
        <span class="navbar-toggler-icon"></span>
      </button>
      <span class="text-white ms-3">Assalamu Alaikum, {{ request.user.username }} </span>
      <div class="collapse navbar-collapse" id="navbarsExample">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/memory/">Memories</a></li>
          <li class="nav-item"><a class="nav-link" href="/documents/">Documents</a></li>
          <li class="nav-item"><a class="nav-link" href="/message/">Messages</a></li>
          <li class="nav-item"><a class="nav-link" href="/family/">Family</a></li>
          <li class="nav-item"><a href="/accounts/logout/">logout</a></li>
          <a class="nav-link" href="/switch-settings/">Switch</a>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% if messages %}
  <div class="mb-3 fade-up">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} mb-2">{{ message }}</div>
    {% endfor %}
  </div>
{% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
