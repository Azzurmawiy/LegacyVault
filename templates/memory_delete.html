<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>memory_delete/title>
</head>
<body>
    {% extends 'base.html' %}
{% block content %}

<div class="card p-4">
  <h4 class="mb-2">Delete Memory</h4>
  <p class="page-subtitle">Are you sure you want to delete: <b>{{ memory.title }}</b>?</p>

  <form method="POST">
    {% csrf_token %}
    <button class="btn btn-cocoa big-action" type="submit">Yes, Delete</button>
    <a class="btn btn-warm big-action" href="{% url 'memory' %}">Cancel</a>
  </form>
</div>

{% endblock %}
</body>
</html>
