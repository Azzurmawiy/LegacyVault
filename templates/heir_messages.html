{% extends 'base.html' %}
{% block content %}

<div class="mb-3">
  <div class="page-title">Released Legacy Messages</div>
  <div class="page-subtitle">
    Messages available for {{ recipient.username }}.
  </div>
</div>
<div class="card p-4">
  {% for msg in messages_list %}
    <div class="border rounded-4 p-3 mb-3">
      <div class="fw-bold">{{ msg.title }}</div>
      <div class="page-subtitle mb-2">
        Released on: {{ msg.send_date }}
      </div>
      <div>{{ msg.content }}</div>
    </div>
  {% empty %}
    <div class="page-subtitle">
      No released messages available yet.
    </div>
  {% endfor %}
</div>
{% endblock %}
