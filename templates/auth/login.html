<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • LegacyVault</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg: #FBF6EE;
      --brown: #5A3E2B;
      --accent: #C49A6C;
      --border: #E8DCCB;
    }
    body{
      background: var(--bg);
      color: var(--brown);
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .card{
      width: min(460px, 92vw);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 22px rgba(90, 62, 43, 0.10);
    }
    .brand{
      font-weight: 900;
      letter-spacing: .2px;
    }
    .soft-input{
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 12px;
    }
    .btn-warm{
      background: var(--accent);
      border: none;
      color: #2B1B10;
      font-weight: 800;
      padding: 12px;
      border-radius: 12px;
    }
    .btn-warm:hover{ filter: brightness(0.96); }
    .small-note{ color: #6B5B4B; }
  </style>
</head>

<body>
  <div class="card p-4">
    <div class="text-center mb-3">
      <div class="brand fs-3">🕊️ LegacyVault</div>
      <div class="small-note">Welcome back. Sign in to continue.</div>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <label class="fw-bold mb-1">Username</label>
      <input class="form-control soft-input mb-3" name="username" placeholder="Enter username" required>

      <label class="fw-bold mb-1">Password</label>
      <input type="password" class="form-control soft-input mb-3" name="password" placeholder="Enter password" required>

      <button class="btn btn-warm w-100" type="submit">Login</button>
    </form>
<div class="small-note text-center mt-3"> New here? <a href="/accounts/signup/">Create an account</a></div>
    <div class="small-note text-center mt-3">
      Tip: create an admin user with <code>python manage.py createsuperuser</code>
    </div>
  </div>
</body>
</html>
