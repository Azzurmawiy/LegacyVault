{% extends 'base.html' %}
{% block content %}

<div class="fade-up" style="max-width: 520px; margin: 60px auto;">
  <div class="card p-4 text-center">
    <div style="font-size: 40px; margin-bottom: 12px;">🗑️</div>
    <h4 class="mb-2">Delete Document</h4>
    <p class="page-subtitle mb-4">
      Are you sure you want to permanently delete:<br>
      <strong>{{ doc.title }}</strong>?<br>
      <span style="font-size: 14px;">The file will be removed from storage. This cannot be undone.</span>
    </p>
    <form method="POST">
      {% csrf_token %}
      <div class="d-flex gap-2 justify-content-center">
        <button class="btn btn-cocoa big-action" type="submit">Yes, Delete</button>
        <a class="btn btn-warm big-action" href="{% url 'documents' %}">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
