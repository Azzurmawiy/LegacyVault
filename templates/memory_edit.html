{% extends 'base.html' %}
{% block content %}

<div class="mb-3 fade-up">
  <div class="page-title">Edit Memory</div>
  <div class="page-subtitle">Update your memory below.</div>
</div>

<div class="row g-4 fade-up">
  <div class="col-lg-6 mx-auto">
    <div class="card p-4">
      <h5 class="mb-3">✏️ {{ memory.title }}</h5>
      <form method="POST">
        {% csrf_token %}
        {{ form.title }}
        <div class="mb-3"></div>
        {{ form.description }}
        <div class="mb-3"></div>
        <div class="d-flex gap-2">
          <button class="btn btn-cocoa w-100 big-action" type="submit">Save Changes</button>
          <a class="btn btn-warm w-100 big-action" href="{% url 'memory' %}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
